name: Rafraîchir le dashboard CMA

on:
  schedule:
    - cron: "0 5 * * *"   # tous les jours à 05:00 UTC (~07:00 Paris l'été)
  workflow_dispatch:        # permet aussi un lancement manuel depuis l'onglet Actions

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Régénérer les données depuis Monday
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: node refresh.js

      - name: Commit & push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain index.html)" ]; then
            git add index.html
            git commit -m "Actualisation auto des données — $(date -u +%Y-%m-%d)"
            git push
            echo "Données mises à jour et poussées."
          else
            echo "Aucun changement de données aujourd'hui."
          fi
